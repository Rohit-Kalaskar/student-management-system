<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard – Student Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background: #f0f4ff; }
        .sidebar {
            width: 240px; min-height: 100vh;
            background: linear-gradient(180deg, #1e3a5f 0%, #2563eb 100%);
            position: fixed; top: 0; left: 0;
            display: flex; flex-direction: column;
        }
        .sidebar .brand { color:#fff; padding:1.5rem; border-bottom:1px solid rgba(255,255,255,.15); }
        .sidebar .nav-link { color:rgba(255,255,255,.8); padding:.75rem 1.5rem; border-radius:8px; margin:.2rem .75rem; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background:rgba(255,255,255,.15); color:#fff; }
        .sidebar .nav-link i { margin-right:.6rem; }
        .main { margin-left: 240px; padding: 2rem; }
        .topbar { background:#fff; border-radius:12px; padding:1rem 1.5rem;
                  display:flex; align-items:center; justify-content:space-between;
                  box-shadow:0 2px 10px rgba(0,0,0,.06); margin-bottom:2rem; }
        .stat-card { border:none; border-radius:14px; box-shadow:0 4px 16px rgba(0,0,0,.07); }
        .stat-icon { font-size:2.2rem; }
    </style>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar">
    <div class="brand">
        <i class="bi bi-mortarboard-fill fs-4 me-2"></i>
        <span class="fw-bold fs-5">StudMgmt</span>
    </div>
    <ul class="nav flex-column mt-2">
        <li class="nav-item">
            <a class="nav-link active" th:href="@{/dashboard}"><i class="bi bi-speedometer2"></i>Dashboard</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/students}"><i class="bi bi-people-fill"></i>Students</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/students/new}"><i class="bi bi-person-plus-fill"></i>Add Student</a>
        </li>
    </ul>
    <div class="mt-auto p-3">
        <form th:action="@{/logout}" method="post">
            <button class="btn btn-outline-light w-100 btn-sm">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
            </button>
        </form>
    </div>
</nav>

<!-- Main content -->
<div class="main">
    <div class="topbar">
        <h5 class="mb-0 fw-bold text-primary"><i class="bi bi-speedometer2 me-2"></i>Dashboard</h5>
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-person-circle fs-4 text-primary"></i>
            <span class="fw-semibold" sec:authentication="name">Admin</span>
        </div>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card stat-card p-4" style="border-left:5px solid #2563eb">
                <div class="d-flex align-items-center justify-content-between">
                    <div>
                        <p class="text-muted mb-1 small">Total Students</p>
                        <h2 class="fw-bold text-primary mb-0" th:text="${totalStudents}">0</h2>
                    </div>
                    <i class="bi bi-people-fill stat-icon text-primary opacity-50"></i>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card p-4" style="border-left:5px solid #16a34a">
                <div class="d-flex align-items-center justify-content-between">
                    <div>
                        <p class="text-muted mb-1 small">System Status</p>
                        <h5 class="fw-bold text-success mb-0">Online</h5>
                    </div>
                    <i class="bi bi-activity stat-icon text-success opacity-50"></i>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card p-4" style="border-left:5px solid #f59e0b">
                <div class="d-flex align-items-center justify-content-between">
                    <div>
                        <p class="text-muted mb-1 small">Admin Role</p>
                        <h5 class="fw-bold text-warning mb-0" sec:authentication="name">admin</h5>
                    </div>
                    <i class="bi bi-shield-fill-check stat-icon text-warning opacity-50"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-3 p-4">
        <h6 class="fw-bold mb-3">Quick Actions</h6>
        <div class="d-flex gap-3 flex-wrap">
            <a th:href="@{/students/new}" class="btn btn-primary">
                <i class="bi bi-person-plus-fill me-1"></i>Add New Student
            </a>
            <a th:href="@{/students}" class="btn btn-outline-primary">
                <i class="bi bi-list-ul me-1"></i>View All Students
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
