<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Login – Student Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
        }
        .login-header {
            background: linear-gradient(135deg, #1e3a5f, #2563eb);
            border-radius: 16px 16px 0 0;
            padding: 2rem;
            text-align: center;
            color: #fff;
        }
        .login-header .logo-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: .5rem;
        }
        .login-body { padding: 2rem; }
        .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 .2rem rgba(37,99,235,.25); }
        .btn-login {
            background: linear-gradient(135deg, #1e3a5f, #2563eb);
            border: none;
            padding: .7rem;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: .5px;
        }
        .btn-login:hover { opacity: .9; }
        .input-group-text { background: #f0f4ff; border-right: none; }
        .form-control { border-left: none; }
    </style>
</head>
<body>
<div class="login-card card mx-3">
    <div class="login-header">
        <i class="bi bi-mortarboard-fill logo-icon"></i>
        <h4 class="fw-bold mb-0">Student Management</h4>
        <small class="opacity-75">Admin Portal</small>
    </div>
    <div class="login-body">

        <!-- Error message -->
        <div th:if="${errorMsg}" class="alert alert-danger d-flex align-items-center gap-2" role="alert">
            <i class="bi bi-exclamation-triangle-fill fs-5"></i>
            <span th:text="${errorMsg}"></span>
        </div>

        <!-- Logout message -->
        <div th:if="${logoutMsg}" class="alert alert-success d-flex align-items-center gap-2" role="alert">
            <i class="bi bi-check-circle-fill fs-5"></i>
            <span th:text="${logoutMsg}"></span>
        </div>

        <form th:action="@{/login}" method="post" novalidate>
            <!-- CSRF token auto-added by Thymeleaf + Spring Security -->

            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-fill text-primary"></i></span>
                    <input type="text" name="username" class="form-control"
                           placeholder="Enter your username" required autofocus/>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill text-primary"></i></span>
                    <input type="password" name="password" id="passwordField" class="form-control"
                           placeholder="Enter your password" required/>
                    <button class="btn btn-outline-secondary" type="button"
                            onclick="togglePwd()" title="Show/hide password">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-login w-100 text-white rounded-3">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>

        <p class="text-center text-muted small mt-3 mb-0">
            <i class="bi bi-shield-lock me-1"></i>Secured admin access only
        </p>
    </div>
</div>

<script>
function togglePwd() {
    const f = document.getElementById('passwordField');
    const e = document.getElementById('eyeIcon');
    if (f.type === 'password') {
        f.type = 'text';
        e.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
        f.type = 'password';
        e.classList.replace('bi-eye-slash', 'bi-eye');
    }
}
</script>
</body>
</html>
