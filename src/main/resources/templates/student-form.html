<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${isEdit} ? 'Edit Student' : 'Add Student'">Student Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background:#f0f4ff; }
        .sidebar { width:240px; min-height:100vh; background:linear-gradient(180deg,#1e3a5f,#2563eb); position:fixed; top:0; left:0; display:flex; flex-direction:column; }
        .sidebar .brand { color:#fff; padding:1.5rem; border-bottom:1px solid rgba(255,255,255,.15); }
        .sidebar .nav-link { color:rgba(255,255,255,.8); padding:.75rem 1.5rem; border-radius:8px; margin:.2rem .75rem; }
        .sidebar .nav-link:hover { background:rgba(255,255,255,.15); color:#fff; }
        .sidebar .nav-link i { margin-right:.6rem; }
        .main { margin-left:240px; padding:2rem; }
        .topbar { background:#fff; border-radius:12px; padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 10px rgba(0,0,0,.06); margin-bottom:2rem; }
        .form-control:focus { border-color:#2563eb; box-shadow:0 0 0 .2rem rgba(37,99,235,.2); }
        .form-label { font-weight:600; color:#374151; }
        .phone-hint { font-size:.8rem; color:#6b7280; margin-top:.25rem; }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="brand">
        <i class="bi bi-mortarboard-fill fs-4 me-2"></i>
        <span class="fw-bold fs-5">StudMgmt</span>
    </div>
    <ul class="nav flex-column mt-2">
        <li><a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-speedometer2"></i>Dashboard</a></li>
        <li><a class="nav-link active" th:href="@{/students}"><i class="bi bi-people-fill"></i>Students</a></li>
        <li><a class="nav-link" th:href="@{/students/new}"><i class="bi bi-person-plus-fill"></i>Add Student</a></li>
    </ul>
    <div class="mt-auto p-3">
        <form th:action="@{/logout}" method="post">
            <button class="btn btn-outline-light w-100 btn-sm">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
            </button>
        </form>
    </div>
</nav>

<div class="main">
    <div class="topbar">
        <h5 class="mb-0 fw-bold text-primary">
            <i class="bi bi-person-plus-fill me-2" th:if="${!isEdit}"></i>
            <i class="bi bi-pencil-fill me-2" th:if="${isEdit}"></i>
            <span th:text="${isEdit} ? 'Edit Student' : 'Add New Student'"></span>
        </h5>
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-person-circle fs-4 text-primary"></i>
            <span class="fw-semibold" sec:authentication="name">Admin</span>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-3" style="max-width:640px">
        <div class="card-body p-4">

            <!-- Duplicate Email Error -->
            <div th:if="${errorMsg}" class="alert alert-danger d-flex align-items-center gap-2 mb-4" role="alert">
                <i class="bi bi-exclamation-triangle-fill fs-5"></i>
                <span th:text="${errorMsg}"></span>
            </div>

            <form th:action="${isEdit} ? @{/students/{id}(id=${student.id})} : @{/students}"
                  th:object="${student}" method="post" novalidate>

                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-person me-1 text-primary"></i>Full Name</label>
                    <input type="text" th:field="*{name}" class="form-control"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                           placeholder="e.g. Asha Rao"/>
                    <div class="invalid-feedback" th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-envelope me-1 text-primary"></i>Email Address</label>
                    <input type="email" th:field="*{email}" class="form-control"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                           placeholder="e.g. asha@example.com"/>
                    <div class="invalid-feedback" th:errors="*{email}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-building me-1 text-primary"></i>Department</label>
                    <select th:field="*{department}" class="form-select"
                            th:classappend="${#fields.hasErrors('department')} ? 'is-invalid'">
                        <option value="">-- Select Department --</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Information Technology">Information Technology</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Mechanical">Mechanical</option>
                        <option value="Civil">Civil</option>
                        <option value="Electrical">Electrical</option>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Physics">Physics</option>
                        <option value="Chemistry">Chemistry</option>
                        <option value="Commerce">Commerce</option>
                    </select>
                    <div class="invalid-feedback" th:errors="*{department}"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label"><i class="bi bi-telephone me-1 text-primary"></i>Phone Number</label>
                    <input type="text" th:field="*{phone}" class="form-control"
                           th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                           placeholder="Enter 10-digit phone number"
                           maxlength="10"
                           oninput="this.value=this.value.replace(/[^0-9]/g,'')"/>
                    <div class="invalid-feedback" th:errors="*{phone}"></div>
                    <div class="phone-hint">
                        <i class="bi bi-info-circle me-1"></i>Must be exactly 10 digits (numbers only)
                    </div>
                </div>

                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-save me-1"></i>
                        <span th:text="${isEdit} ? 'Update Student' : 'Save Student'"></span>
                    </button>
                    <a th:href="@{/students}" class="btn btn-outline-secondary px-4">
                        <i class="bi bi-x-circle me-1"></i>Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
