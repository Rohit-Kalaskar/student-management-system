<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Students – Student Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background:#f0f4ff; }
        .sidebar { width:240px; min-height:100vh; background:linear-gradient(180deg,#1e3a5f,#2563eb); position:fixed; top:0; left:0; display:flex; flex-direction:column; }
        .sidebar .brand { color:#fff; padding:1.5rem; border-bottom:1px solid rgba(255,255,255,.15); }
        .sidebar .nav-link { color:rgba(255,255,255,.8); padding:.75rem 1.5rem; border-radius:8px; margin:.2rem .75rem; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background:rgba(255,255,255,.15); color:#fff; }
        .sidebar .nav-link i { margin-right:.6rem; }
        .main { margin-left:240px; padding:2rem; }
        .topbar { background:#fff; border-radius:12px; padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 10px rgba(0,0,0,.06); margin-bottom:2rem; }
        table thead { background:linear-gradient(135deg,#1e3a5f,#2563eb); color:#fff; }
        table thead th { border:none; padding:.9rem 1rem; font-weight:600; }
        .table-hover tbody tr:hover { background:#e8f0fe; }
        tbody td { vertical-align:middle; padding:.85rem 1rem; }
        .badge-dept { background:#e8f0fe; color:#1e3a5f; font-weight:600; padding:.35rem .7rem; border-radius:6px; }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="brand">
        <i class="bi bi-mortarboard-fill fs-4 me-2"></i>
        <span class="fw-bold fs-5">StudMgmt</span>
    </div>
    <ul class="nav flex-column mt-2">
        <li><a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-speedometer2"></i>Dashboard</a></li>
        <li><a class="nav-link active" th:href="@{/students}"><i class="bi bi-people-fill"></i>Students</a></li>
        <li><a class="nav-link" th:href="@{/students/new}"><i class="bi bi-person-plus-fill"></i>Add Student</a></li>
    </ul>
    <div class="mt-auto p-3">
        <form th:action="@{/logout}" method="post">
            <button class="btn btn-outline-light w-100 btn-sm"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
        </form>
    </div>
</nav>

<div class="main">
    <div class="topbar">
        <h5 class="mb-0 fw-bold text-primary"><i class="bi bi-people-fill me-2"></i>Students</h5>
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-person-circle fs-4 text-primary"></i>
            <span class="fw-semibold" sec:authentication="name">Admin</span>
        </div>
    </div>

    <!-- Flash messages -->
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm rounded-3">
        <div class="card-header bg-white d-flex align-items-center justify-content-between py-3 px-4 border-0">
            <form th:action="@{/students}" method="get" class="d-flex gap-2">
                <input type="text" name="search" class="form-control" placeholder="Search by name or email..."
                       th:value="${search}" style="min-width:260px"/>
                <button class="btn btn-primary px-3"><i class="bi bi-search"></i></button>
                <a th:href="@{/students}" class="btn btn-outline-secondary" th:if="${search != null and !search.empty}">
                    <i class="bi bi-x-lg"></i> Clear
                </a>
            </form>
            <a th:href="@{/students/new}" class="btn btn-success">
                <i class="bi bi-person-plus-fill me-1"></i>Add Student
            </a>
        </div>

        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>#</th>
                        <th><i class="bi bi-person me-1"></i>Name</th>
                        <th><i class="bi bi-envelope me-1"></i>Email</th>
                        <th><i class="bi bi-building me-1"></i>Department</th>
                        <th><i class="bi bi-telephone me-1"></i>Phone</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(students)}">
                        <td colspan="6" class="text-center text-muted py-4">
                            <i class="bi bi-inbox fs-2 d-block mb-2"></i>No students found.
                        </td>
                    </tr>
                    <tr th:each="s, i : ${students}">
                        <td class="text-muted" th:text="${i.count}"></td>
                        <td class="fw-semibold" th:text="${s.name}"></td>
                        <td th:text="${s.email}"></td>
                        <td><span class="badge-dept" th:text="${s.department}"></span></td>
                        <td><i class="bi bi-telephone-fill text-success me-1"></i><span th:text="${s.phone}"></span></td>
                        <td class="text-center">
                            <a th:href="@{/students/{id}/edit(id=${s.id})}" class="btn btn-sm btn-outline-primary me-1">
                                <i class="bi bi-pencil-fill"></i>
                            </a>
                            <form th:action="@{/students/{id}/delete(id=${s.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('Delete this student?')">
                                <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash-fill"></i></button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="card-footer bg-white border-0 d-flex align-items-center justify-content-between px-4 py-3"
             th:if="${totalPages > 1}">
            <span class="text-muted small">
                Total: <strong th:text="${totalItems}"></strong> students
            </span>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link" th:href="@{/students(page=${currentPage-1},search=${search})}">
                            <i class="bi bi-chevron-left"></i>
                        </a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages-1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link" th:href="@{/students(page=${i},search=${search})}" th:text="${i+1}"></a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage+1 == totalPages} ? 'disabled'">
                        <a class="page-link" th:href="@{/students(page=${currentPage+1},search=${search})}">
                            <i class="bi bi-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
